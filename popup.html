<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #faf9f7;
      color: #2c2a26;
    }
    header {
      padding: 12px 16px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #6b6760;
    }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-top: 1px solid #f0eeea;
    }
    li:hover { background: #f0ede7; }
    li img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
    }
    .info { min-width: 0; flex: 1; }
    .title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 11px;
      color: #9a968e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ago {
      font-size: 11px;
      color: #b0aca3;
      flex-shrink: 0;
    }
    .empty { padding: 20px 16px; font-size: 13px; color: #9a968e; text-align: center; }
    footer {
      padding: 8px 0 10px;
      text-align: center;
      font-size: 10px;
      color: #d6d3cd;
    }
  </style>
</head>
<body>
  <header>最近访问的标签页</header>
  <ul id="list"></ul>
  <footer>made by Bella Zhuang</footer>
  <script src="popup.js"></script>
</body>
</html>
